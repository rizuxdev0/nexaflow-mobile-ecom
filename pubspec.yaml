name: nexaflow_mobile
description: "Application mobile e-commerce NexaFlow"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.4.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # HTTP / API
  dio: ^5.4.3

  # State Management
  flutter_riverpod: ^2.5.1

  # Navigation
  go_router: ^13.2.0

  # Secure Storage
  flutter_secure_storage: ^9.0.0
  shared_preferences: ^2.2.3

  # UI / Images
  cached_network_image: ^3.3.1
  shimmer: ^3.0.0
  cupertino_icons: ^1.0.6

  # Localisation
  intl: ^0.20.2

  # Utilitaires
  url_launcher: ^6.2.6
  socket_io_client: ^3.0.0
  file_picker: ^8.0.0
  image_picker: ^1.1.0
  path: ^1.9.0
  http_parser: ^4.1.0
  path_provider: ^2.1.2
  permission_handler: ^11.3.1
  flutter_local_notifications: ^17.1.2
  timezone: ^0.9.4
  uuid: ^4.3.3
  geolocator: ^11.0.0
  geocoding: ^3.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
